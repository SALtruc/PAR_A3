# params.yaml - Project C: Reactive autonomous navigation

obstacle_perception:
  ros__parameters:
    scan_topic: /scan_filtered
    depth_topic: /camera/depth/image_rect_raw
    pointcloud_topic: /oak/points
    tof_topic: /range
    tof_topics: /range/fl,/range/fr,/range/rl,/range/rr
    obstacle_topic: /obstacle_representation
    use_lidar: true
    use_depth: false
    use_pointcloud: true
    use_tof: true
    publish_hz: 20.0

    emergency_distance: 0.12
    obstacle_distance: 0.30
    clear_distance: 0.40
    front_center_angle_deg: 0.0
    front_angle_deg: 40.0
    front_percentile: 15.0
    front_close_min_rays: 3
    front_close_min_ratio: 0.01
    side_angle_deg: 70.0
    rear_angle_deg: 35.0
    gap_angle_limit_deg: 110.0
    sensor_stale_sec: 1.0

    depth_obstacle_distance: 0.45
    depth_center_fraction: 0.33
    depth_side_fraction: 0.30
    depth_height_fraction: 0.40
    pointcloud_frame: optical
    pointcloud_percentile: 10.0
    pointcloud_center_half_width_m: 0.35
    pointcloud_side_min_abs_m: 0.15
    pointcloud_side_max_abs_m: 0.75
    pointcloud_vertical_abs_m: 0.75
    pointcloud_min_forward_m: 0.08
    pointcloud_max_forward_m: 4.00
    pointcloud_sample_step: 3
    pointcloud_roi_stride_px: 12
    pointcloud_process_hz: 5.0
    pointcloud_unorganized_max_points: 8000
    dynamic_obstacle_distance: 0.70
    dynamic_closing_speed: 0.80
    dynamic_confirm_sec: 0.20
    front_filter_alpha: 0.35
    obstacle_hold_sec: 0.35
    clear_confirm_sec: 0.20

obstacle_avoidance:
  ros__parameters:
    obstacle_topic: /obstacle_representation
    cmd_vel_topic: /cmd_vel
    cmd_vel_stamped: true
    cmd_vel_frame_id: base_link
    state_topic: /obstacle_avoidance_state
    control_hz: 20.0

    max_speed: 0.10
    min_speed: 0.05
    max_angular_speed: 0.35
    drive_max_angular_speed: 0.12
    gap_kp: 0.65
    corridor_kp: 0.14

    obstacle_distance: 0.30
    clear_distance: 0.40
    slow_distance: 0.55
    front_body_offset_m: 0.10
    dynamic_stop_distance: 0.80
    dynamic_check_frames: 4
    dynamic_clear_frames: 2
    obstacle_stale_sec: 1.0
    turn_out_sec: 0.90
    side_balance_distance: 0.80
    side_protect_distance: 0.30
    turn_direction_hold_sec: 2.5
    debug_decisions: true
    debug_period_sec: 1.0

obstacle_trial_logger:
  ros__parameters:
    obstacle_topic: /obstacle_representation
    state_topic: /obstacle_avoidance_state
    odom_topic: /odom
    collision_topic: /collision_event
    summary_topic: /obstacle_trial_summary
    log_dir: ~/rosbot_obstacle_logs
    summary_period_sec: 5.0
    log_obstacle_samples: true
