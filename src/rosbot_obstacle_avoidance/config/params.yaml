# params.yaml - Project C: Reactive autonomous navigation

obstacle_perception:
  ros__parameters:
    scan_topic: /scan
    depth_topic: /camera/depth/image_rect_raw
    tof_topic: /range
    obstacle_topic: /obstacle_representation
    use_lidar: true
    use_depth: true
    use_tof: true
    publish_hz: 20.0

    emergency_distance: 0.25
    obstacle_distance: 0.70
    clear_distance: 0.90
    front_angle_deg: 30.0
    side_angle_deg: 70.0
    rear_angle_deg: 35.0
    gap_angle_limit_deg: 110.0
    sensor_stale_sec: 1.0

    depth_obstacle_distance: 0.80
    depth_center_fraction: 0.33
    depth_side_fraction: 0.30
    dynamic_obstacle_distance: 1.0
    dynamic_closing_speed: 0.80
    dynamic_confirm_sec: 0.20
    front_filter_alpha: 0.35

obstacle_avoidance:
  ros__parameters:
    obstacle_topic: /obstacle_representation
    cmd_vel_topic: /cmd_vel
    cmd_vel_stamped: true
    cmd_vel_frame_id: base_link
    state_topic: /obstacle_avoidance_state
    control_hz: 20.0

    max_speed: 0.12
    min_speed: 0.05
    reverse_speed: 0.08
    max_angular_speed: 0.50
    gap_kp: 1.25
    corridor_kp: 0.45

    obstacle_distance: 0.70
    clear_distance: 0.90
    dynamic_stop_distance: 0.90
    avoid_turn_only_distance: 0.65
    avoid_forward_distance: 0.90
    backup_clear_distance: 0.35
    dynamic_hold_sec: 0.80
    obstacle_stale_sec: 1.0
    backup_sec: 0.9
    turn_out_sec: 1.8
    wander_enabled: true
    wander_interval_sec: 4.0
    wander_angular_speed: 0.18
    debug_decisions: true
    debug_period_sec: 1.0

obstacle_trial_logger:
  ros__parameters:
    obstacle_topic: /obstacle_representation
    state_topic: /obstacle_avoidance_state
    odom_topic: /odom
    collision_topic: /collision_event
    summary_topic: /obstacle_trial_summary
    log_dir: ~/rosbot_obstacle_logs
    summary_period_sec: 5.0
    log_obstacle_samples: true
